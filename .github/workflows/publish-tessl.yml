# Publishes the AIUP plugins to the Tessl registry when they change.
#
# Each plugin is published only when the version in its
# .tessl-plugin/plugin.json has not already been published — so bump the
# version (e.g. `tessl version patch ./aiup-core`) as part of any change you
# want released. Pushes that touch a plugin without a version bump are skipped,
# not failed.
#
# Each plugin's evals/ directory (committed scenarios) is published with it and
# drives a publish-time eval that produces the registry Impact score. Regenerate
# scenarios with `tessl scenario generate ./<plugin> --workspace aiup` and
# `tessl scenario download --last`, then commit the evals/ changes.
#
# One-time setup:
#   1. Create an API key in the Tessl Web UI (workspace settings → API keys).
#   2. Add it as a repo secret named TESSL_TOKEN
#      (Settings → Secrets and variables → Actions → New repository secret).
name: Publish to Tessl

on:
  push:
    branches: [main]
    paths:
      - 'aiup-core/**'
      - 'aiup-vaadin-jooq/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        plugin: [aiup-core, aiup-vaadin-jooq]
    steps:
      - uses: actions/checkout@v6

      - uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      - name: Publish ${{ matrix.plugin }} if its version is new
        run: |
          set -euo pipefail
          dir="${{ matrix.plugin }}"

          # Dry-run gates the real publish:
          #   exit 0            -> version is new, publish it
          #   "already exists"  -> nothing to release, skip cleanly
          #   any other failure -> real error, fail the job
          set +e
          out=$(tessl plugin publish --dry-run "./$dir" 2>&1)
          code=$?
          set -e
          echo "$out"

          if [ "$code" -eq 0 ]; then
            echo "::notice::Publishing $dir"
            # Publishes the committed evals/ scenarios and runs a publish-time
            # eval to attach the Impact score. --with-scenario-quality-check
            # drops misleading/errored scenarios so a single empty agent run
            # can't tank the average.
            tessl plugin publish "./$dir"
          elif echo "$out" | grep -q "already exists"; then
            echo "::notice::$dir version already published — skipping"
          else
            echo "::error::Pre-publish checks failed for $dir"
            exit 1
          fi
